<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>37GGE</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="index">
  <header class="site-header">
    <a href="/37GGE" class="site-logo">37GGE</a>
    <a href="about" class="site-about">?</a>
  </header>
  <div class="index-layout" data-panel="1">
    <a href="ThinkPad" class="thinkpad-link">
      <img src="img/ThinkPad.png" alt="ThinkPad">
    </a>
    <div class="grid-panel">
      <div class="grid">
        <a href="1" class="cell">1</a>
        <a href="2" class="cell">2</a>
        <a href="3" class="cell">3</a>
        <a href="4" class="cell">4</a>
        <a href="5" class="cell">5</a>
        <a href="6" class="cell">6</a>
        <a href="7" class="cell">7</a>
        <a href="8" class="cell">8</a>
        <a href="9" class="cell">9</a>
        <a href="10" class="cell">10</a>
        <a href="11" class="cell">11</a>
        <a href="12" class="cell">12</a>
        <a href="13" class="cell">13</a>
        <a href="14" class="cell">14</a>
        <a href="15" class="cell">15</a>
        <a href="16" class="cell">16</a>
        <a href="17" class="cell">17</a>
        <a href="18" class="cell">18</a>
        <a href="19" class="cell">19</a>
        <a href="20" class="cell">20</a>
      </div>
    </div>
    <a href="Projector" class="projector-link">
      <img src="img/Projector.png" alt="Projector">
    </a>
  </div>
  <button class="nav-arrow nav-arrow-left" aria-label="Show ThinkPad">&#8592;</button>
  <button class="nav-arrow nav-arrow-right" aria-label="Show Projector">&#8594;</button>
  <script>
    (function () {
      var layout = document.querySelector('.index-layout');
      var leftArrow = document.querySelector('.nav-arrow-left');
      var rightArrow = document.querySelector('.nav-arrow-right');
      var panel = 1;

      function goTo(p) {
        panel = p;
        layout.setAttribute('data-panel', p);
        leftArrow.style.visibility = (p === 0) ? 'hidden' : '';
        rightArrow.style.visibility = (p === 2) ? 'hidden' : '';
      }

      leftArrow.addEventListener('click', function () {
        if (panel === 1) goTo(0);
        else if (panel === 2) goTo(1);
      });

      rightArrow.addEventListener('click', function () {
        if (panel === 1) goTo(2);
        else if (panel === 0) goTo(1);
      });

      var touchStartX = null;
      document.addEventListener('touchstart', function (e) {
        touchStartX = e.touches[0].clientX;
      }, { passive: true });
      document.addEventListener('touchend', function (e) {
        if (touchStartX === null) return;
        var dx = e.changedTouches[0].clientX - touchStartX;
        touchStartX = null;
        if (Math.abs(dx) < 40) return;
        if (dx < 0 && panel < 2) goTo(panel + 1);
        if (dx > 0 && panel > 0) goTo(panel - 1);
      }, { passive: true });

      goTo(1);
    })();
  </script>
</body>
</html>
